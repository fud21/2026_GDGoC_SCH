spring:
  application:
    name: backend
  profiles:
    active: mysql

  # 개발용 기본 DB는 H2 인메모리 (별도 설치/도커 불필요)
  datasource:
    url: jdbc:h2:mem:price_tracker;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      # http://localhost:8080/h2-console 로 DB 확인 가능
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  cors:
    allowed-origins: http://localhost:8081,http://localhost:19006
  crawling:
    # 크롤링 시 사용할 User-Agent 및 timeout(ms)
    user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    timeout-ms: 5000
  auth:
    token-secret: ${AUTH_TOKEN_SECRET:change-this-dev-secret}
    token-expiration-seconds: ${AUTH_TOKEN_EXPIRATION_SECONDS:86400}

---
# MySQL 전환 시: --spring.profiles.active=mysql 로 실행
spring:
  config:
    activate:
      on-profile: mysql
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${MYSQL_DATABASE:price_tracker}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  h2:
    console:
      enabled: false
