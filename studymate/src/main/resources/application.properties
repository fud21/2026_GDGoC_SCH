spring.application.name=studymate
# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/studymatedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration
spring.h2.console.enabled=true

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Firebase Configuration
firebase.config-path=file:config/firebase/serviceAccount.json

# Mail Configuration (Gmail SMTP)
# 실제 발신 계정/앱 비밀번호는 git에 올라가지 않는 application-local.properties에 둡니다.
spring.config.import=optional:application-local.properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

